<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="header" class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" th:href="@{/}">
            DOMORA<span style="color: #c6a482;">.</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto text-uppercase small fw-bold">
                <li class="nav-item"><a class="nav-link px-3" th:href="@{/products}">Sản phẩm</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="#">Bộ sưu tập</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="#">Khuyến mãi</a></li>
            </ul>

            <div class="d-flex align-items-center gap-4">
                <a href="#" class="text-dark"><i class="bi bi-search fs-5"></i></a>

                <div class="dropdown">
                    <a href="#" class="text-dark text-decoration-none d-flex align-items-center dropdown-toggle" data-bs-toggle="dropdown">
                        <i class="bi bi-person fs-4"></i>
                        <span sec:authorize="isAuthenticated()" class="ms-2 small fw-bold" sec:authentication="name">User</span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 p-2">
                        <li sec:authorize="isAnonymous()">
                            <a class="dropdown-item py-2" th:href="@{/login}">
                                <i class="bi bi-box-arrow-in-right me-2"></i> Đăng nhập
                            </a>
                        </li>
                        <li sec:authorize="isAnonymous()">
                            <a class="dropdown-item py-2" th:href="@{/register}">
                                <i class="bi bi-person-plus me-2"></i> Đăng ký
                            </a>
                        </li>

                        <li sec:authorize="isAuthenticated()">
                            <a class="dropdown-item py-2" href="/profile">
                                <i class="bi bi-person-circle me-2"></i> Hồ sơ
                            </a>
                        </li>
                        <li sec:authorize="isAuthenticated()">
                            <hr class="dropdown-divider">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item py-2 text-danger border-0 bg-transparent">
                                    <i class="bi bi-power me-2"></i> Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
                <a href="#" class="text-dark position-relative">
                    <i class="bi bi-bag fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>
</html>
