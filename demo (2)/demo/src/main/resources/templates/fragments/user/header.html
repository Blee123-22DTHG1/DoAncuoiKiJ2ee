<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light domora-navbar sticky-top">
        <div class="container py-2">
            <a class="navbar-brand brand-logo" th:href="@{/}">
                DOMORA
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button"
                    data-bs-toggle="collapse" data-bs-target="#userNavbar"
                    aria-controls="userNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="userNavbar">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-3">
                    <li class="nav-item">
                        <a class="nav-link nav-item-link" th:href="@{/}">Trang chủ</a>
                    </li>
                    <li class="nav-item product-dropdown">
                        <a class="nav-link nav-item-link" th:href="@{/products}">Sản phẩm</a>

                        <ul class="group-category-dropdown">
                            <li th:each="cate : ${group_category}">
                                <a class="dropdown-item-custom"
                                   th:href="@{/products(groupId=${cate.id})}"
                                   th:text="${cate.name}">
                                    Danh mục
                                </a>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-item-link" th:href="@{/categories}">Danh mục</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-item-link" th:href="@{/#featured}">Nổi bật</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-item-link" th:href="@{/#about}">Về DOMORA</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2 domora-actions">
                    <a th:href="@{/products}" class="icon-btn" aria-label="Tìm kiếm">
                        <i class="bi bi-search"></i>
                    </a>

                    <a th:href="@{/cart}" class="icon-btn position-relative" aria-label="Giỏ hàng">
                        <i class="bi bi-bag"></i>
                        <span class="cart-badge"
                              th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}">0</span>
                    </a>

                    <div class="dropdown">
                        <button class="icon-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person"></i>
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end domora-dropdown">

                            <li sec:authorize="isAnonymous()">
                                <a class="dropdown-item" th:href="@{/login}">Đăng nhập</a>
                            </li>
                            <li sec:authorize="isAnonymous()">
                                <a class="dropdown-item" th:href="@{/register}">Đăng ký</a>
                            </li>

                            <li sec:authorize="isAuthenticated()">
                                <span class="dropdown-item-text fw-bold text-dark">
                                    Xin chào, <span sec:authentication="name"></span>
                                </span>
                            </li>

                            <li sec:authorize="isAuthenticated()">
                                <hr class="dropdown-divider">
                            </li>

                            <li sec:authorize="isAuthenticated()">
                                <a class="dropdown-item" th:href="@{/account/profile}">Tài khoản</a>
                            </li>

                            <li sec:authorize="isAuthenticated()">
                                <a class="dropdown-item" th:href="@{/account/orders}">Đơn hàng</a>
                            </li>

                            <li sec:authorize="hasRole('ADMIN')">
                                <a class="dropdown-item" th:href="@{/admin}">Quản trị</a>
                            </li>

                            <li sec:authorize="isAuthenticated()">
                                <hr class="dropdown-divider">
                            </li>

                            <li sec:authorize="isAuthenticated()">
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item text-danger border-0 bg-transparent w-100 text-start">
                                        Đăng xuất
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>

</body>
</html>
