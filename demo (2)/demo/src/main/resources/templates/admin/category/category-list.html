<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1">Quản lý danh mục</h4>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb small mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none">Dashboard</a></li>
                    <li class="breadcrumb-item active">Category</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/admin/category/add}" class="btn btn-primary shadow-sm px-4">
            <i class="fa-solid fa-plus me-2"></i> Thêm mới
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4 py-3 text-muted small fw-bold">ID</th>
                        <th class="py-3 text-muted small fw-bold">DANH MỤC</th>
                        <th class="py-3 text-muted small fw-bold">SLUG</th>
                        <th class="py-3 text-muted small fw-bold">NHÓM CHÍNH</th>
                        <th class="py-3 text-end pe-4 text-muted small fw-bold">THAO TÁC</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categories}">
                        <td class="ps-4 fw-medium text-secondary" th:text="${'#' + cat.id}"></td>
                        <td>
                            <div class="d-flex align-items-center">
                                <div class="cat-icon bg-primary-subtle text-primary rounded-3 me-3">
                                    <i class="fa-solid fa-folder-open small"></i>
                                </div>
                                <span class="fw-bold text-dark" th:text="${cat.name}"></span>
                            </div>
                        </td>
                        <td>
                            <span class="badge bg-light text-muted border fw-normal" th:text="${cat.slug}"></span>
                        </td>
                        <td>
                            <span class="badge px-3 py-2 rounded-pill fw-medium" 
                                  th:classappend="${cat.group != null ? 'bg-info-subtle text-info' : 'bg-secondary-subtle text-secondary'}"
                                  th:text="${cat.group != null ? cat.group.name : 'Chưa phân nhóm'}">
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <div class="btn-group">
                                <a th:href="@{/admin/category/edit/{id}(id=${cat.id})}" 
                                   class="btn btn-sm btn-action me-2" title="Chỉnh sửa">
                                    <i class="fa-solid fa-pen-to-square text-primary"></i>
                                </a>
                                <button class="btn btn-sm btn-action" 
                                        th:onclick="'confirmDelete(' + ${cat.id} + ')'" title="Xóa">
                                    <i class="fa-solid fa-trash-can text-danger"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
