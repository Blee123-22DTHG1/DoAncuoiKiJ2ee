<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{_layout :: layout(~{::pageHead}, ~{::content})}">

<head>
    <th:block th:fragment="pageHead">
        <title>Sản phẩm - DOMORA</title>
        <link rel="stylesheet" th:href="@{/css/product.css}">
    </th:block>
</head>

<body>
    <div th:fragment="content">
        <h2>Danh sách sản phẩm</h2>
        <a href="/admin/products/create" class="btn btn-success mb-3">Thêm sản phẩm mới</a>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>hình ảnh</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.price}"></td>
                    <td>
                        <img th:src="${product.image}" alt="Product Image" style="width: 50px; height: 50px;">
                    </td>
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-primary btn-sm">Sửa</a>
                        
                        <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" 
                           class="btn btn-danger btn-sm" 
                           onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
