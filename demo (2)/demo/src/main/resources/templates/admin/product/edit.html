<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{_layout :: content-wrapper(~{::content})}">
<head>
    <title>Cập nhật sản phẩm - DOMORA</title>
    <link rel="stylesheet" th:href="@{/static/css/product.css}">
</head>
<body>

<div th:fragment="content" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg p-4" style="border-radius: 20px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="font-family: 'Playfair Display', serif; color: #2d2a26;">Chỉnh Sửa Sản Phẩm</h2>
                    <p class="text-muted">Cập nhật thông tin chi tiết cho sản phẩm mã số: <span class="fw-bold" th:text="${product.id}"></span></p>
                    <div class="mx-auto" style="width: 50px; height: 2px; background: #c6a482;"></div>
                </div>

                <form th:action="@{/admin/products/update}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Tên sản phẩm</label>
                        <input type="text" th:field="*{name}" class="form-control rounded-3 py-2" placeholder="Tên sản phẩm..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Đường dẫn hình ảnh</label>
                        <input type="text" th:field="*{image}" class="form-control rounded-3 py-2" placeholder="/images/sofa-luxury.jpg">
                        <div class="mt-2" th:if="*{image}">
                            <small class="text-muted d-block mb-1">Xem trước ảnh hiện tại:</small>
                            <img th:src="*{image}" style="height: 80px; border-radius: 8px; border: 1px solid #ddd;">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Giá bán (đ)</label>
                            <input type="number" th:field="*{price}" class="form-control rounded-3 py-2" step="1000" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold text-uppercase" style="font-size: 0.8rem; letter-spacing: 1px;">Danh mục</label>
                            <select th:field="*{category.id}" class="form-select rounded-3 py-2" required>
                                <option th:each="c : ${categories}"
                                        th:value="${c.id}"
                                        th:text="${c.name}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a th:href="@{/admin/products}" class="btn btn-light rounded-pill px-4 border">QUAY LẠI</a>
                        <button type="submit" class="btn btn-dark rounded-pill px-4" style="background: #5d4037; border: none;">
                            CẬP NHẬT NGAY
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
