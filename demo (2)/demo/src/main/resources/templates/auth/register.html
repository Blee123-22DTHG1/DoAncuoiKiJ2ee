<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản | DOMORA Luxury</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #5d4037; --accent-color: #c6a482; --bg-light: #f9f7f2; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 1000px; width: 100%; display: flex; }
        .login-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&q=80&w=1000') center center no-repeat;
            background-size: cover;
            display: none;
        }
        .login-form-section { flex: 1; padding: 40px 60px; }
        @media (min-width: 768px) { .login-image { display: block; } }
        h2 { font-family: 'Playfair Display', serif; color: var(--primary-color); font-weight: 700; }
        .form-control { border-radius: 8px; padding: 10px; border: 1px solid #ddd; }
        .btn-furniture { background-color: var(--primary-color); color: white; border-radius: 8px; padding: 12px; font-weight: 600; border: none; transition: 0.3s; }
        .btn-furniture:hover { background-color: var(--accent-color); transform: translateY(-2px); }
        .brand-logo { font-size: 1.8rem; font-weight: 800; text-decoration: none; color: #333; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-image"></div>
        <div class="login-form-section">
            <a href="/" class="brand-logo">DOMORA<span style="color: var(--accent-color);">.</span></a>
            <h2>Tạo tài khoản mới</h2>
            <p class="text-muted mb-4">Tham gia cùng cộng đồng yêu nội thất hiện đại.</p>

            <form th:action="@{/register}" method="post">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold text-uppercase">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" placeholder="Ví dụ: binhle123" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold text-uppercase">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold text-uppercase">Xác nhận mật khẩu</label>
                    <input type="password" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-furniture w-100 shadow-sm">ĐĂNG KÝ TÀI KHOẢN</button>
                <p class="text-center mt-4 text-muted small">
                    Đã có tài khoản? <a th:href="@{/login}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">Đăng nhập tại đây</a>
                </p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
