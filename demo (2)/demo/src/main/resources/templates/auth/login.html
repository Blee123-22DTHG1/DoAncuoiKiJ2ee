<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | DOMORA Luxury</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #5d4037;
            --accent-color: #c6a482;
            --bg-light: #f9f7f2;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 100%;
            display: flex;
        }

        /* Phần hình ảnh bên trái */
        .login-image {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=1000') center center no-repeat;
            background-size: cover;
            display: none; /* Ẩn trên mobile */
        }

        /* Phần Form bên phải */
        .login-form-section {
            flex: 1;
            padding: 60px;
        }

        @media (min-width: 768px) {
            .login-image { display: block; }
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            font-weight: 700;
        }

        .form-label { font-weight: 600; font-size: 0.9rem; color: #555; }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(198, 164, 130, 0.25);
        }

        .btn-furniture {
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            margin-top: 10px;
        }

        .btn-furniture:hover {
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            text-decoration: none;
            color: #333;
            margin-bottom: 30px;
            display: block;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-image"></div>

        <div class="login-form-section text-center text-md-start">
            <a href="/" class="brand-logo">DOMORA<span style="color: var(--accent-color);">.</span></a>

            <h2>Chào mừng trở lại</h2>
            <p class="text-muted mb-4">Vui lòng đăng nhập để quản lý không gian của bạn.</p>

            <div th:if="${param.error}" class="alert alert-danger py-2 mb-4" style="font-size: 0.85rem;">
                <i class="bi bi-exclamation-triangle-fill"></i> Tên đăng nhập hoặc mật khẩu không chính xác.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label text-uppercase">Tài khoản</label>
                    <input type="text" name="username" class="form-control" placeholder="Nhập username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label text-uppercase">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check text-start">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small" for="rememberMe">Ghi nhớ tôi</label>
                    </div>
                    <a href="#" class="small text-decoration-none" style="color: var(--accent-color);">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-furniture w-100">ĐĂNG NHẬP NGAY</button>

                <p class="text-center mt-4 text-muted small">
                    Chưa có tài khoản?
                    <a th:href="@{/register}" class="text-decoration-none fw-bold" style="color: var(--primary-color);">
                        Đăng ký ngay
                    </a>
                </p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
