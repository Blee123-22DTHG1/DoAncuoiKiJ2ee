<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Admin Panel'">Admin Panel</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/admin/admin-style.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <aside class="sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-rocket me-2 text-primary"></i>
            <span>DOMORA</span>
        </div>

        <ul class="nav flex-column flex-grow-1 px-2">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${page == 'dashboard'} ? 'active'" th:href="@{/admin}">
                    <i class="fa-solid fa-gauge-high"></i> 
                    <span>Tổng quan</span>
                </a>
            </li>
        
            <li class="nav-item">
                <a class="nav-link d-flex justify-content-between align-items-center" 
                   data-bs-toggle="collapse" href="#productMenu" role="button" 
                   th:aria-expanded="${page != null && (page.contains('product') || page.contains('category'))}">
                    <div>
                        <i class="fa-solid fa-box"></i> 
                        <span>Quản lý kho</span>
                    </div>
                    <i class="fa-solid fa-chevron-down small-icon transition arrow-icon"></i>
                </a>
                <div class="collapse" id="productMenu" 
                     th:classappend="${page != null && (page.contains('product') || page.contains('category'))} ? 'show'">
                     <ul class="nav flex-column ms-4 small">
                        <li>
                            <a class="nav-link py-2" th:href="@{/admin/products}"
                               th:classappend="${page != null && page.contains('product')} ? 'text-primary fw-bold' : ''">
                                <i class="fa-solid fa-circle-dot fs-xs me-2"></i><span>Sản phẩm</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-link py-2" th:href="@{/admin/category}"
                               th:classappend="${page != null && page.contains('category')} ? 'text-primary fw-bold' : ''">
                                <i class="fa-solid fa-circle-dot fs-xs me-2"></i><span>Danh mục</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>
        
            <li class="nav-item">
                <a class="nav-link d-flex justify-content-between align-items-center" 
                   data-bs-toggle="collapse" href="#orderMenu" role="button"
                   th:aria-expanded="${page != null && page.contains('order')}">
                    <div>
                        <i class="fa-solid fa-cart-shopping"></i> 
                        <span>Quản lý đơn hàng</span>
                    </div>
                    <i class="fa-solid fa-chevron-down small-icon transition arrow-icon"></i>
                </a>
                <div class="collapse" id="orderMenu" 
                     th:classappend="${page != null && page.contains('order')} ? 'show'">
                    <ul class="nav flex-column ms-3 small">
                        <li><a class="nav-link py-2" th:href="@{/admin/orders}"><i class="fa-solid fa-clock me-2 text-warning"></i><span>Chờ xác nhận</span></a></li>
                        <li><a class="nav-link py-2" th:href="@{/admin/orders/shipping}"><i class="fa-solid fa-truck-fast me-2 text-info"></i><span>Đang giao</span></a></li>
                        <li><a class="nav-link py-2" th:href="@{/admin/orders/completed}"><i class="fa-solid fa-check-double me-2 text-success"></i><span>Hoàn thành</span></a></li>
                        <li><a class="nav-link py-2" th:href="@{/admin/orders/canceled}"><i class="fa-solid fa-ban me-2 text-danger"></i><span>Đã hủy</span></a></li>
                    </ul>
                </div>
            </li>
        
            <li class="nav-item">
                <a class="nav-link d-flex justify-content-between align-items-center" 
                   data-bs-toggle="collapse" href="#accountMenu" role="button"
                   th:aria-expanded="${page != null && page.contains('account')}">
                    <div>
                        <i class="fa-solid fa-user-shield"></i> 
                        <span>Quản lý tài khoản</span>
                    </div>
                    <i class="fa-solid fa-chevron-down small-icon transition arrow-icon"></i>
                </a>
                <div class="collapse" id="accountMenu" 
                     th:classappend="${page != null && page.contains('account')} ? 'show'">
                    <ul class="nav flex-column ms-3 small">
                        <li><a class="nav-link py-2" th:href="@{/admin/accounts}"><i class="fa-solid fa-users me-2"></i><span>Danh sách User</span></a></li>
                        <li><a class="nav-link py-2" th:href="@{/admin/accounts/roles}"><i class="fa-solid fa-key me-2"></i><span>Phân quyền</span></a></li>
                        <li><a class="nav-link py-2 text-danger" href="#"><i class="fa-solid fa-user-slash me-2"></i><span>Khóa tài khoản</span></a></li>
                    </ul>
                </div>
            </li>
        </ul>

        <div class="p-3">
            <form th:action="@{/logout}" method="post">
                <button class="btn-logout w-100">
                    <i class="fa-solid fa-power-off"></i> 
                    <span>Đăng xuất</span>
                </button>
            </form>
        </div>
    </aside>

    <main class="main-content flex-grow-1" id="main-content">
        <header class="navbar-top d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <button class="btn btn-link text-dark me-3 p-0" id="btn-toggle">
                    <i class="fa-solid fa-bars-staggered fs-4"></i>
                </button>
                <h5 class="mb-0 fw-bold text-dark" th:text="${title}">Quản lý</h5>
            </div>

            <div class="d-flex align-items-center">
                <div class="text-end me-3 d-none d-sm-block">
                    <p class="mb-0 small fw-bold" sec:authentication="name">Username</p>
                    
                    <p class="mb-0 small text-muted" sec:authentication="principal.authorities">Role</p>
                </div>
                
                <img th:src="'https://ui-avatars.com/api/?name=' + ${#authentication.name} + '&background=4f46e5&color=fff'" 
                     class="rounded-circle shadow-sm" width="40" height="40" alt="Avatar">
            </div>
        </header>

        <div class="page-content">
            <div th:if="${success}" class="alert alert-success border-0 shadow-sm alert-dismissible fade show mb-4">
                <i class="fa-solid fa-check-circle me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <nav th:if="${breadcrumb}" aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-decoration-none text-muted">Admin</a></li>
                    <li class="breadcrumb-item active fw-semibold" th:text="${breadcrumb}"></li>
                </ol>
            </nav>

            <div class="card-container shadow-sm">
                <div th:replace="~{'admin/' + ${page} :: content}"></div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btnToggle = document.getElementById('btn-toggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');

        btnToggle.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        });

        // Tự động thu gọn trên thiết bị di động
        if (window.innerWidth < 768) {
            sidebar.classList.add('collapsed');
            mainContent.classList.add('expanded');
        }
    });
</script>
</body>
</html>
